name: Metrics
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: TheOwlKun
          template: classic
          base: activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_lines: yes
